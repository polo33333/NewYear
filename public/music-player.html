<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX HUB - Standalone Music Player</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/control.css">
    <style>
        body {
            background: radial-gradient(circle at top left, #0b0f19 0%, #05070c 100%);
            margin: 0;
            padding: 16px;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .music-player-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
        }

        .music-playlist {
            flex: 1;
            max-height: unset !important;
            /* Allow it to fill the height */
        }

        /* Custom sleek title bar */
        .popout-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 245, 255, 0.15);
            padding-bottom: 8px;
            margin-bottom: 4px;
        }

        .popout-title {
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 900;
            color: #00f5ff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
    <script src="js/auth.js"></script>
</head>

<body>
    <div class="music-player-panel">
        <div class="popout-header">
            <span class="popout-title"><i class="fas fa-music"></i> Standalone Player</span>
            <span
                style="font-size: 9px; color: rgba(255,255,255,0.4); font-family: 'Inter', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Matrix
                System</span>
        </div>

        <label class="btn-pick-folder" title="Chọn các tệp nhạc từ máy tính">
            <i class="fas fa-folder-open"></i> Chọn Tệp Nhạc
            <input type="file" id="music-folder-input" accept="audio/*" multiple style="display:none;"
                onchange="musicPlayerLoadFiles(this.files)">
        </label>


        <style>
            /* ── Visualizer container ── */
            #music-visualizer {
                display: flex;
                align-items: flex-end;
                gap: 2px;
                height: 32px;
                max-height: 32px;
                flex-shrink: 0;
                overflow: hidden;
                border-radius: 8px;
                background: rgba(0, 0, 0, 0.25);
                padding: 0 4px;
                box-sizing: border-box;
                /* Bars mọc từ dưới lên, container clip cứng */
                position: relative;
            }

            .vis-bar {
                flex: 1;
                min-width: 3px;
                height: 2px;
                /* default khi im lặng */
                max-height: 32px;
                /* không bao giờ vượt container */
                border-radius: 2px 2px 0 0;
                align-self: flex-end;
                /* luôn dính đáy */
                transition: height 0.05s linear;
                flex-shrink: 0;
            }
        </style>

        <div id="music-visualizer"></div>

        <div class="music-now-playing" id="music-now-playing">
            <div class="music-marquee-wrap">
                <span class="music-track-name" id="music-track-name">— Chưa chọn bài —</span>
            </div>
            <div class="music-time-row">
                <span id="music-current-time">0:00</span>
                <input type="range" id="music-progress" class="music-progress" value="0" min="0" step="0.1"
                    oninput="musicPlayerSeek(this.value)">
                <span id="music-duration">0:00</span>
            </div>
        </div>

        <div class="music-controls">
            <button class="music-btn" onclick="musicPlayerPrev()" title="Bài trước"><i
                    class="fas fa-backward-step"></i></button>
            <button class="music-btn music-btn-play" id="music-play-btn" onclick="musicPlayerToggle()"
                title="Play/Pause">
                <i class="fas fa-play" id="music-play-icon"></i>
            </button>
            <button class="music-btn" onclick="musicPlayerNext()" title="Bài tiếp"><i
                    class="fas fa-forward-step"></i></button>
            <button class="music-btn" id="music-shuffle-btn" onclick="musicPlayerToggleShuffle()" title="Shuffle"><i
                    class="fas fa-shuffle"></i></button>
            <button class="music-btn" id="music-repeat-btn" onclick="musicPlayerToggleRepeat()" title="Lặp lại"><i
                    class="fas fa-repeat"></i></button>
            <div class="music-volume-wrap">
                <i class="fas fa-volume-high music-vol-icon"></i>
                <input type="range" id="music-volume" class="music-volume" value="80" min="0" max="100"
                    oninput="musicPlayerSetVolume(this.value)">
                <span id="music-volume-pct" class="music-volume-pct">80%</span>
            </div>
        </div>

        <div class="music-playlist custom-scroll" id="music-playlist">
            <div class="music-playlist-empty"><i class="fas fa-music"></i><span>Chọn tệp nhạc để hiện danh sách
                    phát</span></div>
        </div>
    </div>

    <script src="js/toast.js"></script>
    <script src="js/music-player.js"></script>
</body>

</html>
