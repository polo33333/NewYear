<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MATRIX HUD — Stats Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/overlay.css">
  <style>
    body {
      background: transparent !important;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    #stats-scene {
      display: flex !important;
      position: relative !important;
      width: 100% !important;
      height: 100% !important;
      align-items: center !important;
      justify-content: center !important;
      background: transparent !important;
      opacity: 1 !important;
      pointer-events: auto !important;
      animation: none !important;
    }
  </style>
</head>

<body>

  <div id="stats-scene">
    <div class="stats-card">
      <div class="stats-header-bar">
        <div class="stats-header-logo-container">
          <div class="vct-waveform left" style="width: 100px; margin-right: 15px;">
            <div class="vct-wave-line"></div>
            <div class="vct-wave-bars">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
          <img src="images/other/logo-game.png" class="stats-logo" alt="Wuthering Waves">
          <div class="vct-waveform right" style="width: 100px; margin-left: 15px;">
            <div class="vct-wave-bars">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="vct-wave-line"></div>
          </div>
        </div>
        <div class="stats-header-divider"></div>
        <div class="stats-header-title-wrapper">
          <div class="stats-header-line-left">
            <svg viewBox="0 0 400 24" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style="width: 100%; height: 24px;">
              <defs>
                <linearGradient id="leftLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="rgba(255, 255, 255, 0)"/>
                  <stop offset="40%" stop-color="rgba(255, 255, 255, 0.05)"/>
                  <stop offset="100%" stop-color="rgba(255, 255, 255, 0.3)"/>
                </linearGradient>
              </defs>
              <path d="M0 12 H375" stroke="url(#leftLineGrad)" stroke-width="1.5"/>
              <path d="M380 6 L387 12 L380 18" stroke="rgba(255, 255, 255, 0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M387 6 L394 12 L387 18" stroke="#00f5ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="stats-title" id="statsLabel">MATCH STATISTICS</div>
          <div class="stats-header-line-right">
            <svg viewBox="0 0 400 24" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style="width: 100%; height: 24px;">
              <defs>
                <linearGradient id="rightLineGrad" x1="100%" y1="0%" x2="0%" y2="0%">
                  <stop offset="0%" stop-color="rgba(255, 255, 255, 0)"/>
                  <stop offset="40%" stop-color="rgba(255, 255, 255, 0.05)"/>
                  <stop offset="100%" stop-color="rgba(255, 255, 255, 0.3)"/>
                </linearGradient>
              </defs>
              <path d="M400 12 H25" stroke="url(#rightLineGrad)" stroke-width="1.5"/>
              <path d="M20 6 L13 12 L20 18" stroke="rgba(255, 255, 255, 0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M13 6 L6 12 L13 18" stroke="#00f5ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>
      <div class="stats-container" id="statsContainer">
        <!-- Rendered from JS -->
      </div>
    </div>
  </div>

  <script src="js/stats.js?v=2"></script>
</body>

</html>
