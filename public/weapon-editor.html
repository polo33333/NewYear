<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX HUD - Weapon Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Exo+2:wght@600;800&family=Inter:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/character-editor.css">
    <link rel="stylesheet" href="css/sidebar.css?v=4">
    <link rel="stylesheet" href="css/toast.css">
    <script src="js/auth.js"></script>
    <link rel="stylesheet" href="/css/light-mode.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar mini" id="app-sidebar">
            <div class="sidebar-header">
                <div class="logo sidebar-logo">MATRIX HUD</div>
                <button class="sidebar-toggle" id="sidebar-toggle"><i class="fas fa-bars"></i></button>
            </div>
            <nav>
                <a href="/" class="nav-link">
                    <span class="nav-icon"><i class="fas fa-gamepad"></i></span>
                    <span class="nav-text">Điều khiển</span>
                </a>
                <a href="/character-editor" class="nav-link">
                    <span class="nav-icon"><i class="fas fa-user"></i></span>
                    <span class="nav-text">Nhân vật</span>
                </a>
                <a href="/weapon-editor" class="nav-link active">
                    <span class="nav-icon"><i class="fas fa-gavel"></i></span>
                    <span class="nav-text">Vũ khí</span>
                </a>
                <a href="/history" class="nav-link">
                    <span class="nav-icon"><i class="fas fa-history"></i></span>
                    <span class="nav-text">Lịch sử</span>
                </a>
                <a href="/bracket" class="nav-link" data-tab="bracket" style="display: none;">
                    <span class="nav-icon"><i class="fas fa-sitemap"></i></span>
                    <span class="nav-text">Bracket</span>
                </a>
                <a href="/settings" class="nav-link">
                    <span class="nav-icon"><i class="fas fa-cog"></i></span>
                    <span class="nav-text">Cài đặt</span>
                </a>
            </nav>
        </aside>

        <div class="main-content">
            <header>
                <div class="brand">
                    <h1>Quản lý Vũ khí</h1>
                    <p id="wp-stats-summary">Đang tải dữ liệu...</p>
                </div>
                <div class="header-right">
                    <div class="header-status-group">
                        <div class="status-badge">
                            <div class="conn-dot status-dot"></div> <span class="conn-text">OFFLINE</span>
                        </div>
                    </div>
                    <button class="btn-logout" onclick="logout()" title="Logout"><i
                            class="fas fa-power-off"></i></button>
                </div>
            </header>

            <div id="char-editor-container">
                <div class="controls">
                    <div class="search-box">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="wp-search-input" placeholder="Tìm kiếm theo tên...">
                    </div>

                    <div class="filter-group">
                        <span class="filter-label">Loại:</span>
                        <div id="wp-type-filters" class="filter-group">
                            <button class="filter-btn active" data-type="0">Tất cả</button>
                            <button class="filter-btn" data-type="1"><img src="images/weapon-type/broadblade-icon.webp"
                                    alt="Broadblade"
                                    style="width: 20px; height: 20px; vertical-align: middle; margin-right: 4px;">
                                Broadblade</button>
                            <button class="filter-btn" data-type="2"><img src="images/weapon-type/sword-icon.webp"
                                    alt="Sword"
                                    style="width: 20px; height: 20px; vertical-align: middle; margin-right: 4px;">
                                Sword</button>
                            <button class="filter-btn" data-type="3"><img src="images/weapon-type/pistols-icon.webp"
                                    alt="Pistols"
                                    style="width: 20px; height: 20px; vertical-align: middle; margin-right: 4px;">
                                Pistols</button>
                            <button class="filter-btn" data-type="4"><img src="images/weapon-type/gauntlets-icon.webp"
                                    alt="Gauntlets"
                                    style="width: 20px; height: 20px; vertical-align: middle; margin-right: 4px;">
                                Gauntlets</button>
                            <button class="filter-btn" data-type="5"><img src="images/weapon-type/rectifier-icon.webp"
                                    alt="Rectifier"
                                    style="width: 20px; height: 20px; vertical-align: middle; margin-right: 4px;">
                                Rectifier</button>
                        </div>
                    </div>

                    <div class="filter-group">
                        <span class="filter-label">Độ hiếm:</span>
                        <div id="wp-rank-filters" class="filter-group">
                            <button class="filter-btn active" data-rank="0">Tất cả</button>
                            <button class="filter-btn rank5" data-rank="5">5★</button>
                            <button class="filter-btn rank4" data-rank="4">4★</button>
                            <button class="filter-btn rank3" data-rank="3">3★</button>
                            <button class="filter-btn rank2" data-rank="2">2★</button>
                            <button class="filter-btn rank1" data-rank="1">1★</button>
                        </div>
                    </div>

                    <div class="actions">
                        <button class="btn btn-outline-danger" id="wp-reset-btn">
                            <i class="fas fa-trash-alt"></i> Đặt lại
                        </button>
                        <button class="btn btn-primary" id="wp-save-server-btn">
                            <i class="fas fa-save"></i> Lưu
                        </button>
                    </div>
                </div>

                <div class="table-container">
                    <table id="wp-table">
                        <thead>
                            <tr>
                                <th class="text-center">#</th>
                                <th class="text-center" title="Image"><i class="fas fa-image"></i></th>
                                <th>Tên</th>
                                <th class="text-center">Độ hiếm</th>
                                <th>Loại</th>
                                <th class="text-center">R1</th>
                                <th class="text-center">R2</th>
                                <th class="text-center">R3</th>
                                <th class="text-center">R4</th>
                                <th class="text-center">R5</th>
                                <th class="text-center" style="width: 140px;">Kích hoạt</th>
                            </tr>
                        </thead>
                        <tbody id="wp-table-body">
                            <!-- Rows will be injected here -->
                        </tbody>
                    </table>
                    <div id="wp-empty-message" class="empty-state" style="display: none;">
                        Không tìm thấy vũ khí nào trong kho...
                    </div>
                </div>

                <div class="pagination" id="wp-pagination-controls">
                    <button class="page-btn" id="wp-prev-page" disabled>Trước</button>
                    <span class="page-info" id="wp-page-display">Trang 1 / 1</span>
                    <button class="page-btn" id="wp-next-page" disabled>Sau</button>
                </div>
            </div>

            <footer>
                <div id="wp-footer-stats">Tổng số: 0 | Đã lọc: 0</div>
                <div>Được tạo cho MATRIX HUD</div>
            </footer>

            <div id="toast" class="save-toast">✓ Xuất JSON thành công!</div>

            <script src="js/toast.js"></script>
            <script src="js/weapon-editor.js?v=3"></script>
            <script src="js/sidebar.js"></script>
        </div>
    </div>
</body>

</html>
