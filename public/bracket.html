<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX HUD - Match History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Exo+2:wght@600;800&family=Inter:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/character-editor.css">
    <link rel="stylesheet" href="css/sidebar.css?v=4">
    <link rel="stylesheet" href="css/history.css?v=5">
    <link rel="stylesheet" href="css/toast.css">
    <script src="js/auth.js"></script>
    <link rel="stylesheet" href="/css/light-mode.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar mini" id="app-sidebar">
            <div class="sidebar-header">
                <div class="logo sidebar-logo">MATRIX HUD</div>
                <button class="sidebar-toggle" id="sidebar-toggle"><i class="fas fa-bars"></i></button>
            </div>
            <nav>
                <a href="/" class="nav-link">
                    <span class="nav-icon"><i class="fas fa-gamepad"></i></span>
                    <span class="nav-text">Control</span>
                </a>
                <a href="/character-editor" class="nav-link">
                    <span class="nav-icon"><i class="fas fa-user"></i></span>
                    <span class="nav-text">Character</span>
                </a>
                <a href="/weapon-editor" class="nav-link">
                    <span class="nav-icon"><i class="fas fa-gavel"></i></span>
                    <span class="nav-text">Weapon</span>
                </a>
                <a href="/history" class="nav-link active">
                    <span class="nav-icon"><i class="fas fa-history"></i></span>
                    <span class="nav-text">History</span>
                </a>
        <a href="/bracket" class="nav-link" data-tab="bracket">
          <span class="nav-icon"><i class="fas fa-sitemap"></i></span>
          <span class="nav-text">Bracket</span>
        </a>
                <a href="/settings" class="nav-link">
                    <span class="nav-icon"><i class="fas fa-cog"></i></span>
                    <span class="nav-text">Settings</span>
                </a>
            </nav>
        </aside>

        <div class="main-content">
            <header>
                <div class="brand">
                    <h1>Tournament Bracket</h1>
                    <p>Manage and visualize tournament brackets</p>
                </div>
                <div class="header-right">
                    <div class="header-status-group">
                        <div class="status-badge">
                            <div class="conn-dot status-dot"></div> <span class="conn-text">OFFLINE</span>
                        </div>
                    </div>
                    <button class="btn-logout" onclick="logout()" title="Logout"><i class="fas fa-power-off"></i></button>
                </div>
            </header>





            <!-- TOURNAMENT BRACKET DESIGNER -->
            <div id="history-bracket-view" class="history-subtab-content" style="display: flex; flex: 1; flex-direction: column; overflow: hidden; height: calc(100vh - 170px); position: relative; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; background: rgba(8, 12, 28, 0.4);">
                <div class="bracket-designer-layout" style="display: flex; flex: 1; height: 100%; overflow: hidden; width: 100%;">
                    
                    <!-- Left Sidebar: Saved Matches & Seeds -->
                    <!-- Right Main Area: Workspace Canvas (Now full width with top toolbar) -->
                    <div class="bracket-designer-workspace" id="bracket-workspace" style="flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; background: #040814;">
                        
                        <!-- Canvas Viewport -->
                        <div class="bracket-canvas-viewport" id="bracket-canvas-viewport" style="flex: 1; width: 100%; height: 100%; overflow: hidden; position: relative; cursor: grab;">
                            
                            <!-- Pannable/Zoomable Canvas -->
                            <div class="bracket-canvas grid-bg" id="bracket-canvas" style="position: absolute; top: 0; left: 0; width: 5000px; height: 5000px; transform-origin: 0 0; pointer-events: auto;">
                                
                                <!-- SVG Connections Overlay -->
                                <svg class="bracket-svg-layer" id="bracket-svg-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2;"></svg>
                                
                                <!-- Nodes Container -->
                                <div class="bracket-nodes-container" id="bracket-nodes-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></div>
                                
                            </div>
                        </div>

                        <!-- Canvas Zoom/Pan & Controls HUD -->
                        <div class="canvas-controls-hud" id="bracket-hud" style="position: absolute; bottom: 20px; right: 20px; z-index: 100; display: flex; align-items: center; gap: 8px; background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 6px 12px; backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);">
                            <!-- Toggle Button -->
                            <button onclick="toggleHudCollapse()" id="btn-hud-toggle" title="Mở rộng / Thu gọn thanh công cụ" style="padding: 6px 10px; font-size: 11px; display: flex; align-items: center; justify-content: center; background: rgba(0, 245, 255, 0.08); border-color: rgba(0, 245, 255, 0.15); color: var(--accent); transition: transform 0.2s;"><i class="fas fa-chevron-right" id="hud-toggle-icon"></i></button>

                            <!-- Content Wrapper -->
                            <div id="hud-content-wrapper" style="display: flex; align-items: center; gap: 8px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: right center;">
                                <!-- Node Creation Tools -->
                                <button onclick="addMatchNode()" title="Thêm Cặp Trận" style="padding: 6px 10px; font-size: 11px;"><i class="fas fa-gamepad"></i></button>
                                <button onclick="addSeedNode()" title="Thêm Ô Tên Đội (Seed)" style="padding: 6px 10px; font-size: 11px;"><i class="fas fa-user-plus"></i></button>
                                <button onclick="addRegionNode()" title="Thêm Vùng Nền" style="padding: 6px 10px; font-size: 11px;"><i class="fas fa-vector-square"></i></button>
                                
                                <span class="hud-divider" style="width: 1px; height: 16px; background: rgba(255,255,255,0.15); margin: 0 4px;"></span>

                                <!-- Canvas Controls -->
                                <button onclick="zoomBracket(0.1)" title="Zoom In" style="padding: 6px 10px; font-size: 11px;"><i class="fas fa-plus"></i></button>
                                <button onclick="zoomBracket(-0.1)" title="Zoom Out" style="padding: 6px 10px; font-size: 11px;"><i class="fas fa-minus"></i></button>
                                <button onclick="resetBracketView()" title="Reset View" style="padding: 6px 10px; font-size: 11px;"><i class="fas fa-expand"></i></button>
                                <button onclick="toggleBracketGrid()" id="btn-toggle-grid" title="Bật/Tắt lưới" class="active" style="padding: 6px 10px; font-size: 11px;"><i class="fas fa-border-all"></i></button>
                                
                                <span class="hud-divider" style="width: 1px; height: 16px; background: rgba(255,255,255,0.15); margin: 0 4px;"></span>
                                
                                <!-- Save/Reset Actions -->
                                <button onclick="saveBracketConfig()" class="btn-save-bracket" style="background: var(--success); color: #0b0d14; border-color: var(--success); padding: 6px 14px; font-size: 11px; font-weight: 700;"><i class="fas fa-save" style="margin-right: 4px;"></i> LƯU SƠ ĐỒ</button>
                                <button onclick="copyPublicBracketLink()" class="btn-share-bracket" style="background: rgba(0, 245, 255, 0.15); border-color: rgba(0, 245, 255, 0.4); color: var(--accent); padding: 6px 14px; font-size: 11px; font-weight: 700; margin-left: 2px;"><i class="fas fa-share-alt" style="margin-right: 4px;"></i> CHIA SẺ</button>
                                <button onclick="clearBracketConfig()" class="btn-clear-bracket" style="background: transparent; border-color: var(--danger); color: var(--danger); padding: 6px 14px; font-size: 11px; font-weight: 700;"><i class="fas fa-trash" style="margin-right: 4px;"></i> XÓA HẾT</button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>


            <!-- Match Details Modal -->
            <div id="hist-details-modal" class="modal-overlay" style="display: none; z-index: 100000;">
                <div class="modal-content"
                    style="width: 1200px; max-width: 95vw; background: #0f172a; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; display: flex; flex-direction: column;">
                    <div class="modal-header"
                        style="border-bottom: 1px solid rgba(255,255,255,0.05); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;">
                        <h3 class="modal-title" id="hist-modal-match-title"
                            style="font-family: 'Outfit', sans-serif; font-weight: 700; color: #fff; margin: 0; font-size: 18px;">
                        </h3>
                        <button class="modal-close" onclick="closeDetailsModal()"
                            style="background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; transition: 0.2s;">&times;</button>
                    </div>

                    <div class="modal-body custom-scroll"
                        style="padding: 20px; overflow-y: auto; max-height: 70vh; display: flex; flex-direction: column; gap: 15px;">
                        <!-- Header Team Names -->
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px;">
                            <div style="flex: 1; text-align: left;">
                                <span id="hist-modal-team-a-label"
                                    style="font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 16px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px;">TEAM
                                    A</span>
                            </div>
                            <div
                                style="font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 900; color: rgba(255,255,255,0.15); margin: 0 30px; letter-spacing: 2px;">
                                ROSTER ROUNDS</div>
                            <div style="flex: 1; text-align: right;">
                                <span id="hist-modal-team-b-label"
                                    style="font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 16px; color: var(--success); text-transform: uppercase; letter-spacing: 1px;">TEAM
                                    B</span>
                            </div>
                        </div>

                        <!-- Side by Side Scrollable Rounds -->
                        <div class="roster-rounds-container custom-scroll"
                            style="display: flex; gap: 20px; padding: 0; overflow-y: visible;">
                            <div class="rounds-col" id="hist-roundsA-detail-container"
                                style="flex: 1; display: flex; flex-direction: column; gap: 10px;"></div>
                            <div class="divider-v"
                                style="width: 1px; background: rgba(255,255,255,0.08); flex-shrink: 0;"></div>
                            <div class="rounds-col" id="hist-roundsB-detail-container"
                                style="flex: 1; display: flex; flex-direction: column; gap: 10px;"></div>
                        </div>
                    </div>

                    <div class="modal-footer"
                        style="border-top: 1px solid rgba(255,255,255,0.05); padding: 16px 20px; display: flex; justify-content: flex-end; gap: 12px; background: rgba(0,0,0,0.1);">
                        <button class="page-btn" onclick="closeDetailsModal()"
                            style="padding: 8px 24px; font-weight: 600; cursor: pointer;">Đóng</button>
                    </div>
                </div>
            </div>

            <!-- Bracket Match Selector Modal -->
            <div id="bracket-select-modal" class="modal-overlay" style="display: none; z-index: 100000;">
                <div class="modal-content"
                    style="width: 600px; max-width: 90vw; background: #0f172a; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; display: flex; flex-direction: column;">
                    <div class="modal-header"
                        style="border-bottom: 1px solid rgba(255,255,255,0.05); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;">
                        <h3 class="modal-title"
                            style="font-family: 'Outfit', sans-serif; font-weight: 700; color: #fff; margin: 0; font-size: 16px;">
                            Chọn Trận Đấu Từ Lịch Sử
                        </h3>
                        <button class="modal-close" onclick="closeBracketSelectModal()"
                            style="background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; transition: 0.2s;">&times;</button>
                    </div>

                    <div class="modal-body custom-scroll"
                        style="padding: 20px; overflow-y: auto; max-height: 60vh; display: flex; flex-direction: column; gap: 12px;">
                        <div class="search-box" style="width: 100%; margin-bottom: 8px;">
                            <input type="text" id="bracket-modal-search" oninput="filterBracketSelectModalMatches()"
                                placeholder="Tìm kiếm trận đấu (tên đội, giải đấu)..." style="width: 100%;">
                        </div>
                        <div id="bracket-modal-matches-list" style="display: flex; flex-direction: column; gap: 8px;">
                            <!-- Populated dynamically in JS -->
                        </div>
                    </div>

                    <div class="modal-footer"
                        style="border-top: 1px solid rgba(255,255,255,0.05); padding: 16px 20px; display: flex; justify-content: flex-end; gap: 12px; background: rgba(0,0,0,0.1);">
                        <button id="btn-bracket-modal-unbind" class="page-btn" onclick="unbindActiveMatch()"
                            style="padding: 8px 24px; font-weight: 600; cursor: pointer; background: var(--danger); border-color: var(--danger); color: #fff; display: none;">Gỡ Trận Đấu</button>
                        <button class="page-btn" onclick="closeBracketSelectModal()"
                            style="padding: 8px 24px; font-weight: 600; cursor: pointer;">Hủy</button>
                    </div>
                </div>
            </div>

            <div id="toast" class="save-toast" style="display: none;">✓ Thao tác thành công!</div>

            <script src="js/sidebar.js?v=4"></script>
            <script src="js/toast.js?v=3"></script>
            <script src="js/bracket.js?v=5"></script>
        </div>
    </div>
</body>

</html>
