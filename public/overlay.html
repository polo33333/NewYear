<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MATRIX HUD — OBS Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/overlay.css">
  <style>
    @keyframes spin-disc {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .spin-anim {
      animation: spin-disc 3s linear infinite;
    }

    .song-marquee-container {
      width: auto;
      max-width: 250px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .song-marquee-text {
      display: inline-block;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .song-marquee-text.scrolling {
      padding-left: 100%;
      animation: song-marquee 10s linear infinite;
      text-overflow: clip;
    }

    @keyframes song-marquee {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(-100%, 0);
      }
    }

    #song-overlay {
      transition: opacity 0.4s ease, transform 0.4s ease;
      transform: translateY(0);
      opacity: 1;
    }

    #song-overlay.hidden {
      opacity: 0 !important;
      transform: translateY(20px) !important;
      pointer-events: none !important;
    }
  </style>
</head>

<body>

  <div id="scene-overlay"></div>

  <div id="scoreboard" class="hidden">
    <div class="sb-container">

      <!-- TEAM A (LEFT - GREEN/RED) -->
      <div class="sb-side left" id="teamA">
        <div class="sb-bar-row">
          <div class="sb-pill-container left-pill">
            <div class="sb-pill-score" id="scoreA">0</div>
          </div>
          <span class="sb-team-name" id="nameA">DRAGONS</span>
          <span class="sb-pill-net" id="netPointsA"></span>
        </div>
      </div>

      <!-- TEAM B (RIGHT - BLUE) -->
      <div class="sb-side right" id="teamB">
        <div class="sb-bar-row">
          <span class="sb-pill-net" id="netPointsB"></span>
          <span class="sb-team-name" id="nameB">PHANTOMS</span>
          <div class="sb-pill-container right-pill">
            <div class="sb-pill-score" id="scoreB">0</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="scoreboard2" class="hidden">
    <div class="sb2-container">
      <div class="sb2-score-left" id="scoreA2">0</div>
      <div class="sb2-team-name-left" id="nameA2">DRAGONS</div>
      <div class="sb2-diff-pill" id="scoreDiff">0</div>
      <div class="sb2-team-name-right" id="nameB2">PHANTOMS</div>
      <div class="sb2-score-right" id="scoreB2">0</div>
    </div>
  </div>


  <div id="roster-left" class="roster-panel left hidden">
    <div class="roster-title" id="rosterNameA">TEAM A</div>
    <div class="hero-list" id="heroListA"></div>
    <div class="roster-points"><span class="roster-points-label">ROUND POINTS</span><span id="rosterPointsA">0</span>
    </div>
  </div>

  <div id="roster-right" class="roster-panel right hidden">
    <div class="roster-title" id="rosterNameB">TEAM B</div>
    <div class="hero-list" id="heroListB"></div>
    <div class="roster-points"><span class="roster-points-label">ROUND POINTS</span><span id="rosterPointsB">0</span>
    </div>
  </div>

  <div id="song-overlay" class="hidden"
    style="position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(5, 5, 10, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 8px 24px; color: #fff; display: flex; align-items: center; gap: 16px; border-top: 1px solid rgba(0, 245, 255, 0.2); z-index: 9999; font-family: 'Outfit', sans-serif; box-shadow: 0 -5px 25px rgba(0,0,0,0.4);">
    <div style="display: flex; align-items: center; gap: 8px;">
      <i class="fas fa-compact-disc spin-anim" style="color: #00f5ff; font-size: 16px;"></i>
      <span
        style="font-size: 12px; font-weight: 800; color: #00f5ff; letter-spacing: 2px; text-transform: uppercase;">Đang
        phát</span>
    </div>
    <div class="song-marquee-container">
      <span id="overlay-song-name" class="song-marquee-text"></span>
    </div>
  </div>

  <div id="ticker" class="hidden">
    <div class="ticker-badge">◉ LIVE</div>
    <div class="ticker-track">
      <div class="ticker-inner" id="tickerInner"></div>
    </div>
  </div>

  <div id="stats-scene">
    <div class="stats-card">
      <div class="stats-title" id="statsLabel">MATCH STATISTICS</div>
      <div class="stats-container" id="statsContainer">
        <!-- Render from JS -->
      </div>
    </div>
  </div>

  <div id="break-scene" class="vct-bracket">
    <!-- Background Decor -->
    <div class="vct-bg-grid"></div>
    <div class="vct-bg-dots"></div>
    <div class="vct-bg-watermark">MATRIX LEAGUE</div>
    <div class="vct-hud-frame">
      <div class="vct-hud-corner tl"></div>
      <div class="vct-hud-corner tr"></div>
      <div class="vct-hud-corner bl"></div>
      <div class="vct-hud-corner br"></div>
      <div class="vct-hud-side-line left"></div>
      <div class="vct-hud-side-line right"></div>
    </div>

    <!-- Top Header -->
    <div class="vct-header">
      <div class="vct-title" id="bracketLabel">WUTHERING WAVES</div>
      <div class="vct-subtitle" id="bracketSubtitle">REGULAR SEASON - WEEK 1</div>
    </div>

    <!-- Coming Up Timer -->
    <div class="vct-timer-wrapper">
      <div class="vct-timer-label">COMING UP</div>
      <div class="vct-timer-value" id="breakTimer">00:00</div>
    </div>

    <!-- Matchup Body -->
    <div class="vct-matchups">
      <!-- Match 1 -->
      <div class="vct-match">
        <div class="vct-team vct-team-blue left" id="bmTeam1">
          <div class="vct-team-name" id="bName1">ZETA DIVISION</div>
        </div>
        <div class="vct-vs">[vs]</div>
        <div class="vct-team vct-team-red right" id="bmTeam2">
          <div class="vct-team-name" id="bName2">DRX</div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="vct-footer">
      <div class="vct-footer-logo-placeholder">
        <i class="fas fa-asterisk"></i> Wuthering Waves
      </div>
    </div>
  </div>




  <script src="js/overlay.js"></script>
</body>

</html>
