<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MATRIX HUD — OBS Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/overlay.css">
</head>

<body>

  <div id="scene-overlay"></div>

  <div id="scoreboard" class="hidden">
    <div class="sb-container">
      
      <!-- TEAM A (LEFT - GREEN/RED) -->
      <div class="sb-side left" id="teamA">
        <div class="sb-bar-row">
          <div class="sb-pill-container left-pill">
            <div class="sb-pill-score" id="scoreA">0</div>
          </div>
          <span class="sb-team-name" id="nameA">DRAGONS</span>
          <span class="sb-pill-net" id="netPointsA"></span>
        </div>
      </div>
      
      <!-- TEAM B (RIGHT - BLUE) -->
      <div class="sb-side right" id="teamB">
        <div class="sb-bar-row">
          <span class="sb-pill-net" id="netPointsB"></span>
          <span class="sb-team-name" id="nameB">PHANTOMS</span>
          <div class="sb-pill-container right-pill">
            <div class="sb-pill-score" id="scoreB">0</div>
          </div>
        </div>
      </div>
      
    </div>
  </div>


  <div id="roster-left" class="roster-panel left hidden">
    <div class="roster-title" id="rosterNameA">TEAM A</div>
    <div class="hero-list" id="heroListA"></div>
    <div class="roster-points"><span class="roster-points-label">ROUND POINTS</span><span id="rosterPointsA">0</span>
    </div>
  </div>

  <div id="roster-right" class="roster-panel right hidden">
    <div class="roster-title" id="rosterNameB">TEAM B</div>
    <div class="hero-list" id="heroListB"></div>
    <div class="roster-points"><span class="roster-points-label">ROUND POINTS</span><span id="rosterPointsB">0</span>
    </div>
  </div>

  <div id="ticker" class="hidden">
    <div class="ticker-badge">◉ LIVE</div>
    <div class="ticker-track">
      <div class="ticker-inner" id="tickerInner"></div>
    </div>
  </div>

  <div id="stats-scene">
    <div class="stats-card">
      <div class="stats-title" id="statsLabel">MATCH STATISTICS</div>
      <div class="stats-container" id="statsContainer">
        <!-- Render from JS -->
      </div>
    </div>
  </div>

  <div id="bracket-scene">
    <div class="bracket-container">
      <div class="bracket-content">
        <div class="bracket-title" id="bracketLabel">MATCH UP</div>
        <div class="bracket-matchup">
          <div class="bm-team left" id="bmTeam1">
            <div class="bm-name" id="bName1">DRAGONS</div>
          </div>
          <div class="bm-vs-container">
            <div class="bm-vs-badge">VS</div>
          </div>
          <div class="bm-team right" id="bmTeam2">
            <div class="bm-name" id="bName2">PHANTOMS</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="break-scene">
    <div class="break-container">
      <div class="break-content">
        <div class="break-timer" id="breakTimer">00:00</div>
      </div>
    </div>
  </div>

  <script src="js/overlay.js"></script>
</body>

</html>
