<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MATRIX HUB - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;900&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #060813;
      --card-bg: rgba(10, 15, 30, 0.7);
      --accent: #00f5ff;
      --accent-glow: rgba(0, 245, 255, 0.35);
      --purple: #8b5cf6;
      --text: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.4);
      --border: rgba(0, 245, 255, 0.12);
      --border-hover: rgba(0, 245, 255, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Background animated glow orbs */
    body::before {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0, 245, 255, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
      top: -150px;
      left: -150px;
      z-index: 0;
      animation: float 14s ease-in-out infinite alternate;
    }

    body::after {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.06) 0%, rgba(0, 0, 0, 0) 70%);
      bottom: -200px;
      right: -200px;
      z-index: 0;
      animation: float 16s ease-in-out infinite alternate-reverse;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(60px, 40px) scale(1.15);
      }
    }

    /* Cyber grid overlay */
    .bg-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.008) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.008) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
    }

    /* Glassmorphic Login Card */
    .login-card {
      position: relative;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 380px;
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.8),
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 0 40px rgba(0, 245, 255, 0.02);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .login-card:hover {
      border-color: var(--border-hover);
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.9),
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 0 55px rgba(0, 245, 255, 0.04);
    }

    .login-header {
      margin-bottom: 36px;
      text-align: center;
      width: 100%;
    }

    .login-logo {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin: 0 0 6px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .login-logo span {
      color: var(--accent);
      text-shadow:
        0 0 10px rgba(0, 245, 255, 0.8),
        0 0 20px rgba(0, 245, 255, 0.3);
    }

    .login-subtitle {
      font-size: 10px;
      color: var(--text-dim);
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .input-group {
      margin-bottom: 24px;
      text-align: left;
      width: 100%;
    }

    .input-label {
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .input-label i {
      font-size: 11px;
      color: var(--accent);
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    .input-wrapper i.input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.2);
      font-size: 14px;
      transition: all 0.2s ease;
      pointer-events: none;
    }

    .login-input {
      width: 100%;
      height: 46px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      color: #fff;
      padding: 0 16px 0 42px;
      font-size: 14px;
      outline: none;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      box-sizing: border-box;
      font-family: inherit;
    }

    .login-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .login-input:hover {
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(0, 0, 0, 0.5);
    }

    .login-input:focus {
      border-color: var(--accent);
      background: rgba(0, 0, 0, 0.6);
      box-shadow: 0 0 15px rgba(0, 245, 255, 0.12);
    }

    .login-input:focus+i.input-icon {
      color: var(--accent);
      text-shadow: 0 0 8px rgba(0, 245, 255, 0.5);
    }

    /* Password show/hide toggle */
    .btn-toggle-visibility {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      padding: 4px;
      font-size: 14px;
      transition: color 0.2s ease;
    }

    .btn-toggle-visibility:hover {
      color: var(--accent);
    }

    /* eSports Gradient Button */
    .btn-login {
      width: 100%;
      height: 46px;
      background: linear-gradient(135deg, #00f5ff 0%, #00b8d4 100%);
      color: #050811;
      font-weight: 800;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(0, 245, 255, 0.2);
      font-family: 'Outfit', sans-serif;
    }

    .btn-login:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
      box-shadow:
        0 8px 30px rgba(0, 245, 255, 0.35),
        0 0 20px rgba(0, 245, 255, 0.15);
    }

    .btn-login:active {
      transform: translateY(-0.5px);
    }

    .btn-login:disabled {
      pointer-events: none;
      opacity: 0.6;
    }

    /* Loading Spinner */
    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(5, 8, 17, 0.3);
      border-top-color: #050811;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Error Alert Banner */
    .error-msg {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 8px;
      color: #f87171;
      font-size: 13px;
      font-weight: 500;
      padding: 12px 16px;
      margin-top: 20px;
      display: none;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-6px);
      }

      75% {
        transform: translateX(6px);
      }
    }

    /* 🌊 Dynamic Wave Background Effect */
    .waves-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 180px;
      min-height: 100px;
      max-height: 250px;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    .waves {
      position: relative;
      width: 100%;
      height: 100%;
      margin-bottom: -7px;
    }

    .parallax > use {
      animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
    }

    .parallax > use:nth-child(1) {
      animation-delay: -2s;
      animation-duration: 7s;
    }

    .parallax > use:nth-child(2) {
      animation-delay: -3s;
      animation-duration: 10s;
    }

    .parallax > use:nth-child(3) {
      animation-delay: -4s;
      animation-duration: 13s;
    }

    .parallax > use:nth-child(4) {
      animation-delay: -5s;
      animation-duration: 20s;
    }

    @keyframes move-forever {
      0% {
        transform: translate3d(-90px, 0, 0);
      }
      100% {
        transform: translate3d(85px, 0, 0);
      }
    }
  </style>
</head>

<body>
  <div class="bg-grid"></div>

  <!-- Animated Wave Background -->
  <div class="waves-container">
    <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
      viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
      <defs>
        <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18v44h-352z" />
      </defs>
      <g class="parallax">
        <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(0, 245, 255, 0.04)" />
        <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(139, 92, 246, 0.03)" />
        <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(0, 245, 255, 0.06)" />
        <use xlink:href="#gentle-wave" x="48" y="7" fill="rgba(6, 8, 19, 0.95)" />
      </g>
    </svg>
  </div>

  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">MATRIX <span>HUB</span></div>
      <div class="login-subtitle">Stream Control Suite</div>
    </div>

    <div class="input-group">
      <div class="input-label">
        <i class="fas fa-user-circle"></i> Username
      </div>
      <div class="input-wrapper">
        <input type="text" id="username" class="login-input" placeholder="Enter username...">
        <i class="fas fa-user input-icon"></i>
      </div>
    </div>

    <div class="input-group">
      <div class="input-label">
        <i class="fas fa-shield-alt"></i> Password
      </div>
      <div class="input-wrapper">
        <input type="password" id="password" class="login-input" placeholder="••••••••"
          onkeyup="if(event.key === 'Enter') doLogin()">
        <i class="fas fa-lock input-icon"></i>
        <button type="button" class="btn-toggle-visibility" id="btn-toggle" title="Ẩn/Hiện mật khẩu">
          <i class="fas fa-eye-slash" id="toggle-icon"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">
      <span class="spinner" id="btn-spinner"></span>
      <span id="btn-text">Login</span>
    </button>

    <div id="error-msg" class="error-msg">
      <i class="fas fa-exclamation-triangle"></i>
      <span id="error-text">Sai tài khoản hoặc mật khẩu!</span>
    </div>
  </div>

  <script>
    // Redirect if already authenticated
    if (localStorage.getItem('nexus_auth_token')) {
      window.location.href = '/';
    }

    // Toggle password visibility
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('btn-toggle');
    const toggleIcon = document.getElementById('toggle-icon');

    if (toggleBtn && passwordInput && toggleIcon) {
      toggleBtn.addEventListener('click', () => {
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          toggleIcon.className = 'fas fa-eye';
        } else {
          passwordInput.type = 'password';
          toggleIcon.className = 'fas fa-eye-slash';
        }
      });
    }

    // Authentication Request Handler
    async function doLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const err = document.getElementById('error-msg');
      const errText = document.getElementById('error-text');

      const btn = document.getElementById('btn-login');
      const spinner = document.getElementById('btn-spinner');
      const btnText = document.getElementById('btn-text');

      if (!u || !p) {
        showError('Vui lòng điền đầy đủ tài khoản và mật khẩu!');
        return;
      }

      // Show loading state
      btn.disabled = true;
      spinner.style.display = 'block';
      btnText.innerText = 'Authenticating...';
      err.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('nexus_auth_token', data.token);
          // Small success delay for animation feel
          setTimeout(() => {
            window.location.href = '/';
          }, 400);
        } else {
          showError(data.message || 'Tài khoản hoặc mật khẩu không đúng!');
          resetBtnState();
        }
      } catch (e) {
        showError('Lỗi kết nối máy chủ, vui lòng thử lại sau!');
        resetBtnState();
      }
    }

    function showError(message) {
      const err = document.getElementById('error-msg');
      const errText = document.getElementById('error-text');

      // Trigger shake animation
      err.style.display = 'flex';
      errText.innerText = message;
      err.style.animation = 'none';
      err.offsetHeight; // trigger reflow
      err.style.animation = null;
    }

    function resetBtnState() {
      const btn = document.getElementById('btn-login');
      const spinner = document.getElementById('btn-spinner');
      const btnText = document.getElementById('btn-text');

      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.innerText = 'Access Dashboard';
    }
  </script>
</body>

</html>
