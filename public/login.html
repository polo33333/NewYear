<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MATRIX HUD — Đăng nhập</title>
  <script>
    (function () {
      const mode = localStorage.getItem('uiMode') || 'dark';
      document.documentElement.setAttribute('data-ui-mode', mode);
      document.addEventListener('DOMContentLoaded', () => {
        document.body.setAttribute('data-ui-mode', mode);
      });
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="icon" type="image/x-icon" href="/images/other/favicon.ico">
  <link rel="manifest" href="/manifest.json">
</head>

<body>

  <!-- ── LEFT PANEL ── -->
  <div class="left">
    <!-- Game Logo -->
    <div class="game-logo" style="position: absolute; top: 32px; left: 48px; z-index: 10;">
      <img src="images/other/logo-game.webp" alt="Game Logo" style="height: 38px; width: auto; object-fit: contain;">
    </div>

    <!-- Slide backgrounds -->
    <div class="bg-slides">
      <div class="bg-slide active" style="background-image: url('images/other/bg-1.webp');"></div>
      <div class="bg-slide" style="background-image: url('images/other/bg-2.webp');"></div>
      <div class="bg-slide" style="background-image: url('images/other/bg-3.webp');"></div>
      <div class="bg-slide" style="background-image: url('images/other/bg-4.webp');"></div>
    </div>

    <!-- Overlays -->
    <div class="left-overlay"></div>
    <canvas id="binary-canvas"
      style="position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; opacity: 0.15;"></canvas>
    <div class="orb"></div>
    <div class="scan-line"></div>
    <div class="brand-bg">MATRIX</div>

    <div class="left-content">
      <p class="tagline">Overlay Control Suite v1.2</p>

      <h1 class="hero-title">
        MATRIX
        <span class="accent">HUD</span>
      </h1>

      <p class="hero-desc">
        Hệ thống quản lý luồng overlay thời gian thực.<br>
        Kết nối. Kiểm soát. Tính điểm trận đấu.
      </p>
    </div>

    <!-- Location Details & Carousel Selector -->
    <div class="location-carousel">
      <div class="location-info">
        <div class="location-text-wrap" id="location-text-wrap">
          <div class="location-subtitle" id="loc-subtitle"></div>
          <div class="location-title" id="loc-title"></div>
          <div class="location-desc" id="loc-desc"></div>
        </div>
        <div style="width: 100%; margin-top: 12px; display: flex; flex-direction: column; gap: 6px;">
          <span id="progress-percent"
            style="font-size: 10px; font-family: 'Outfit', sans-serif; color: var(--cyan); font-weight: 600; opacity: 0.85; text-shadow: 0 0 8px var(--cyan-glow); align-self: flex-start;">0%</span>
          <div class="progress-bar-container" style="margin: 0; width: 100%;">
            <div class="progress-bar-fill" id="progress-bar-fill"></div>
          </div>
        </div>
      </div>

      <div class="carousel-controls">
        <button class="carousel-nav" onclick="prevSlide()"><i class="fas fa-chevron-left"></i></button>
        <div class="carousel-thumbnails">
          <div class="thumb active" onclick="setSlide(0)" style="background-image: url('images/other/bg-1.webp');">
          </div>
          <div class="thumb" onclick="setSlide(1)" style="background-image: url('images/other/bg-2.webp');"></div>
          <div class="thumb" onclick="setSlide(2)" style="background-image: url('images/other/bg-3.webp');"></div>
          <div class="thumb" onclick="setSlide(3)" style="background-image: url('images/other/bg-4.webp');"></div>
        </div>
        <button class="carousel-nav" onclick="nextSlide()"><i class="fas fa-chevron-right"></i></button>
      </div>
    </div>
  </div>

  <!-- ── DIVIDER ── -->
  <div class="divider"></div>

  <!-- ── RIGHT PANEL ── -->
  <div class="right">
    <canvas id="leaves-canvas"
      style="position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.35;"></canvas>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="right-content">
      <p class="form-eyebrow">Xác thực hệ thống</p>
      <h2 class="form-title">Đăng nhập</h2>

      <form id="login-form" onsubmit="event.preventDefault(); doLogin();">
        <div class="field">
          <label class="field-label" for="username">Tên đăng nhập</label>
          <div class="field-wrap">
            <input type="text" id="username" class="field-input" placeholder="username..." autocomplete="username">
            <i class="fas fa-terminal field-icon"></i>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="password">Mật khẩu</label>
          <div class="field-wrap">
            <input type="password" id="password" class="field-input" placeholder="••••••••"
              autocomplete="current-password">
            <i class="fas fa-lock field-icon"></i>
            <button type="button" class="toggle-vis" id="btn-toggle">
              <i class="fas fa-eye-slash" id="toggle-icon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="btn-login">
          <span class="spinner" id="btn-spinner"></span>
          <span id="btn-text">Truy cập Hệ thống</span>
          <i class="fas fa-arrow-right" id="btn-arrow"></i>
        </button>
      </form>

      <div id="error-msg" class="error-msg">
        <i class="fas fa-circle-xmark"></i>
        <span id="error-text">Sai tài khoản hoặc mật khẩu!</span>
      </div>

      <div class="form-meta">
        <span class="sys-badge">SYS/<span>MATRIX-HUD</span></span>
      </div>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>

</html>
