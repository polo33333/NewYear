<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MATRIX HUB — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #04060f;
      --surface: #080d1c;
      --cyan: #00ffe7;
      --cyan-dim: rgba(0, 255, 231, 0.12);
      --cyan-glow: rgba(0, 255, 231, 0.25);
      --red: #ff3b5c;
      --text: #e8eaf0;
      --text-dim: rgba(232, 234, 240, 0.35);
      --border: rgba(0, 255, 231, 0.1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      display: flex;
      align-items: stretch;
      overflow: hidden;
    }

    /* ── Left panel ── */
    .left {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 64px;
      overflow: hidden;
    }

    /* Scanline texture */
    .left::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 255, 231, 0.012) 2px,
          rgba(0, 255, 231, 0.012) 4px);
      pointer-events: none;
      z-index: 1;
    }

    /* Giant rotated wordmark */
    .brand-bg {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Syne', sans-serif;
      font-size: clamp(100px, 15vw, 240px);
      font-weight: 900;
      color: transparent;
      -webkit-text-stroke: 1px rgba(0, 255, 231, 0.035);
      letter-spacing: 0.1;
      white-space: nowrap;
      user-select: none;
      pointer-events: none;
      z-index: 0;
    }

    /* Animated corner scan-line */
    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0.3;
      animation: scan 6s linear infinite;
      z-index: 2;
    }

    @keyframes scan {
      0% {
        top: -1%;
        opacity: 0;
      }

      5% {
        opacity: 0.3;
      }

      95% {
        opacity: 0.3;
      }

      100% {
        top: 101%;
        opacity: 0;
      }
    }

    .left-content {
      position: relative;
      z-index: 3;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .tagline {
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 28px;
      opacity: 0.8;
    }

    .tagline::before {
      content: '//';
      margin-right: 8px;
      opacity: 0.5;
    }

    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(48px, 6vw, 88px);
      font-weight: 900;
      line-height: 0.95;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 32px;
    }

    .hero-title .accent {
      color: var(--cyan);
      display: inline-block;
      margin-left: 16px;
      text-shadow: 0 0 40px rgba(0, 255, 231, 0.4);
    }

    .hero-desc {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-dim);
      max-width: 480px;
      border-top: 1px solid rgba(0, 255, 231, 0.15);
      border-bottom: 1px solid rgba(0, 255, 231, 0.15);
      padding: 16px 24px;
      margin-bottom: 48px;
    }

    /* Status dots */
    .status-row {
      display: flex;
      gap: 56px;
      justify-content: center;
    }

    .status-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .status-val {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
    }

    .status-lbl {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* Glowing orb */
    .orb {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0, 255, 231, 0.07) 0%, transparent 65%);
      bottom: -200px;
      left: -150px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Divider ── */
    .divider {
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(0, 255, 231, 0.15) 30%, rgba(0, 255, 231, 0.15) 70%, transparent);
    }

    /* ── Right panel ── */
    .right {
      width: 460px;
      min-width: 400px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 64px 52px;
      position: relative;
      overflow: hidden;
    }

    /* Grid overlay */
    .right::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 255, 231, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 231, 0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    /* Corner bracket decoration */
    .corner {
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: rgba(0, 255, 231, 0.3);
      border-style: solid;
    }

    .corner-tl {
      top: 24px;
      left: 24px;
      border-width: 2px 0 0 2px;
    }

    .corner-tr {
      top: 24px;
      right: 24px;
      border-width: 2px 2px 0 0;
    }

    .corner-bl {
      bottom: 24px;
      left: 24px;
      border-width: 0 0 2px 2px;
    }

    .corner-br {
      bottom: 24px;
      right: 24px;
      border-width: 0 2px 2px 0;
    }

    .right-content {
      position: relative;
      z-index: 1;
    }

    /* Form header */
    .form-eyebrow {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 8px;
      opacity: 0.7;
    }

    .form-title {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 36px;
    }

    /* Input field */
    .field {
      margin-bottom: 20px;
    }

    .field-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    .field-wrap {
      position: relative;
    }

    .field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 12px;
      transition: color 0.2s;
      pointer-events: none;
    }

    .field-input {
      width: 100%;
      height: 48px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 6px;
      color: #fff;
      padding: 0 44px 0 40px;
      font-size: 13px;
      font-family: 'Outfit', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .field-input::placeholder {
      color: rgba(255, 255, 255, 0.15);
    }

    .field-input:hover {
      border-color: rgba(0, 255, 231, 0.2);
      background: rgba(0, 0, 0, 0.6);
    }

    .field-input:focus {
      border-color: var(--cyan);
      background: rgba(0, 0, 0, 0.7);
      box-shadow: 0 0 0 3px rgba(0, 255, 231, 0.08), inset 0 0 20px rgba(0, 255, 231, 0.02);
    }

    .field-wrap:focus-within .field-icon {
      color: var(--cyan);
    }

    .toggle-vis {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 12px;
      padding: 4px;
      transition: color 0.2s;
    }

    .toggle-vis:hover {
      color: var(--cyan);
    }

    /* Submit */
    .btn-submit {
      width: 100%;
      height: 50px;
      margin-top: 12px;
      background: transparent;
      border: 1px solid var(--cyan);
      border-radius: 6px;
      color: var(--cyan);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
      transition: all 0.25s;
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--cyan);
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 0;
    }

    .btn-submit:hover::before {
      transform: translateX(0);
    }

    .btn-submit:hover {
      color: #04060f;
      box-shadow: 0 0 30px rgba(0, 255, 231, 0.25);
    }

    .btn-submit span,
    .btn-submit .spinner,
    .btn-submit i {
      position: relative;
      z-index: 1;
    }

    .btn-submit:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(4, 6, 15, 0.3);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Error */
    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(255, 59, 92, 0.07);
      border: 1px solid rgba(255, 59, 92, 0.2);
      border-radius: 4px;
      color: var(--red);
      font-size: 11px;
      padding: 10px 14px;
      margin-top: 16px;
      animation: shake 0.35s ease;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-5px);
      }

      75% {
        transform: translateX(5px);
      }
    }

    /* Bottom meta */
    .form-meta {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sys-badge {
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .sys-badge span {
      color: var(--cyan);
      opacity: 0.8;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* Responsive */
    @media (max-width: 860px) {
      body {
        flex-direction: column;
        overflow-y: auto;
      }

      .left {
        padding: 48px 36px;
        flex: none;
        min-height: 50vh;
      }

      .divider {
        display: none;
      }

      .right {
        width: 100%;
        min-width: 0;
        min-height: 50vh;
        padding: 48px 36px;
      }

      .brand-bg {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- ── LEFT PANEL ── -->
  <div class="left">
    <canvas id="binary-canvas"
      style="position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;"></canvas>
    <div class="orb"></div>
    <div class="scan-line"></div>
    <div class="brand-bg">MATRIX</div>

    <div class="left-content">
      <p class="tagline">Overlay Control Suite v1.1</p>

      <h1 class="hero-title">
        MATRIX
        <span class="accent">HUB</span>
      </h1>

      <p class="hero-desc">
        Hệ thống quản lý luồng overlay thời gian thực.<br>
        Kết nối. Kiểm soát. Chấm điểm trận đấu.
      </p>

      <div class="status-row">
        <div class="status-item">
          <span class="status-val">24/7</span>
          <span class="status-lbl">Uptime</span>
        </div>
        <div class="status-item">
          <span class="status-val">99.9%</span>
          <span class="status-lbl">Reliability</span>
        </div>
        <div class="status-item">
          <span class="status-val">MIT Liscense</span>
          <span class="status-lbl">License</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── DIVIDER ── -->
  <div class="divider"></div>

  <!-- ── RIGHT PANEL ── -->
  <div class="right">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="right-content">
      <p class="form-eyebrow">Xác thực hệ thống</p>
      <h2 class="form-title">Đăng nhập</h2>

      <div class="field">
        <label class="field-label" for="username">Tên đăng nhập</label>
        <div class="field-wrap">
          <input type="text" id="username" class="field-input" placeholder="username..." autocomplete="off">
          <i class="fas fa-terminal field-icon"></i>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Mật khẩu</label>
        <div class="field-wrap">
          <input type="password" id="password" class="field-input" placeholder="••••••••"
            onkeyup="if(event.key==='Enter') doLogin()">
          <i class="fas fa-lock field-icon"></i>
          <button type="button" class="toggle-vis" id="btn-toggle">
            <i class="fas fa-eye-slash" id="toggle-icon"></i>
          </button>
        </div>
      </div>

      <button class="btn-submit" id="btn-login" onclick="doLogin()">
        <span class="spinner" id="btn-spinner"></span>
        <span id="btn-text">Access System</span>
        <i class="fas fa-arrow-right" id="btn-arrow"></i>
      </button>

      <div id="error-msg" class="error-msg">
        <i class="fas fa-circle-xmark"></i>
        <span id="error-text">Sai tài khoản hoặc mật khẩu!</span>
      </div>

      <div class="form-meta">
        <span class="sys-badge">SYS/<span>MATRIX-HUB</span></span>
        <div class="live-dot"></div>
      </div>
    </div>
  </div>

  <script>
    if (localStorage.getItem('kdone_auth_token')) {
      window.location.href = '/';
    }

    const pwInput = document.getElementById('password');
    const toggleBtn = document.getElementById('btn-toggle');
    const toggleIcon = document.getElementById('toggle-icon');
    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        const show = pwInput.type === 'password';
        pwInput.type = show ? 'text' : 'password';
        toggleIcon.className = show ? 'fas fa-eye' : 'fas fa-eye-slash';
      });
    }

    async function doLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (!u || !p) { showError('Vui lòng điền đầy đủ tài khoản và mật khẩu!'); return; }

      const btn = document.getElementById('btn-login');
      const spinner = document.getElementById('btn-spinner');
      const btnText = document.getElementById('btn-text');
      const btnArrow = document.getElementById('btn-arrow');

      btn.disabled = true;
      spinner.style.display = 'block';
      btnText.innerText = 'Authenticating...';
      btnArrow.style.display = 'none';
      document.getElementById('error-msg').style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('kdone_auth_token', data.token);
          localStorage.setItem('kdone_user_id', data.user.id);
          localStorage.setItem('kdone_username', data.user.username);
          localStorage.setItem('kdone_is_admin', data.user.isAdmin ? 'true' : 'false');
          setTimeout(() => { window.location.href = '/'; }, 400);
        } else {
          showError(data.message || 'Tài khoản hoặc mật khẩu không đúng!');
          resetBtn();
        }
      } catch {
        showError('Lỗi kết nối máy chủ, vui lòng thử lại sau!');
        resetBtn();
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.style.display = 'flex';
      document.getElementById('error-text').innerText = msg;
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = null;
    }

    function resetBtn() {
      const btn = document.getElementById('btn-login');
      btn.disabled = false;
      document.getElementById('btn-spinner').style.display = 'none';
      document.getElementById('btn-text').innerText = 'Access System';
      document.getElementById('btn-arrow').style.display = '';
    }

    // Binary numbers floating up effect (Hacker effect)
    (() => {
      const canvas = document.getElementById('binary-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let width = canvas.width = canvas.offsetWidth;
      let height = canvas.height = canvas.offsetHeight;

      window.addEventListener('resize', () => {
        width = canvas.width = canvas.offsetWidth;
        height = canvas.height = canvas.offsetHeight;
      });

      const particles = [];
      const maxParticles = 130;

      class Particle {
        constructor() {
          this.reset(true);
        }

        reset(init = false) {
          this.x = Math.random() * width;
          this.y = init ? Math.random() * height : height + Math.random() * 50 + 10;
          this.speed = Math.random() * 1.6 + 0.4;
          this.fontSize = Math.random() * 13 + 9;
          this.opacity = Math.random() * 0.22 + 0.03;
          this.value = Math.random() > 0.5 ? '1' : '0';
          this.changeInterval = Math.floor(Math.random() * 25) + 12;
          this.counter = 0;
        }

        update() {
          this.y -= this.speed;
          this.counter++;
          if (this.counter >= this.changeInterval) {
            this.value = Math.random() > 0.5 ? '1' : '0';
            this.counter = 0;
          }
          if (this.y < -30) {
            this.reset(false);
          }
        }

        draw() {
          ctx.fillStyle = `rgba(0, 255, 231, ${this.opacity})`;
          ctx.font = `${this.fontSize}px 'Outfit', sans-serif`;
          ctx.fillText(this.value, this.x, this.y);
        }
      }

      for (let i = 0; i < maxParticles; i++) {
        particles.push(new Particle());
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach(p => {
          p.update();
          p.draw();
        });
        requestAnimationFrame(animate);
      }

      animate();
    })();
  </script>
</body>

</html>
